name: Knip Approval

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  knip:
    name: Knip Approval
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Knip
        run: npm run check:knip
